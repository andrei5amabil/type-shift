version: '3.8'

services:
  db:
    image: docker.io/library/postgres:latest
    container_name: media-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mediashift
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql
    restart: always

volumes:
  db-data: